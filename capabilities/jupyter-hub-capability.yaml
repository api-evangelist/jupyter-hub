        outputParameters:
        - name: result
          type: object
          value: $.
    - name: groups-name-users
      path: /groups/{name}/users
      operations:
      - name: adduserstogroup
        method: POST
        description: Add users to a group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: removeusersfromgroup
        method: DELETE
        description: Remove users from a group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: services
      path: /services
